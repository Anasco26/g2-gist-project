<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — G2-gist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="logo">G2<span>-gist</span></a>
    </div>
  </header>

  <main class="container">
    <section class="page-title">
      <h1>Contact Us</h1>
      <p>Send us a message — we'd love to hear from you.</p>
    </section>

    <section class="content">
      <form id="contactForm" action="#" method="post">
        <label for="fullname">Full name</label>
        <input type="text" id="fullname" name="fullname" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 G2-gist movie Blog.</p>
    </div>
  </footer>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Thanks for reaching out! This essages yet configured fron the backend.');
    });
  </script>
</body>
</html>
