<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Newsletter Signup — G2-gist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="logo">G2<span>-gist</span></a>
    </div>
  </header>

  <main class="container">
    <section class="page-title">
      <h1>Subscribe to our Newsletter</h1>
      <p>Get the latest movie reviews and lists delivered to your inbox.</p>
    </section>

    <section class="content">
      <form id="newsletterForm" action="#" method="post">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <button type="submit">Subscribe</button>
      </form>
      <p class="note">Note: This is a static demo form — you can hook it up to your backend or a service like Mailchimp.</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 G2-gist movie Blog.</p>
    </div>
  </footer>

  <script>
    document.getElementById('newsletterForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Thanks! This demo form does not send data yet.');
    });
  </script>
</body>
</html>
