<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Post — G2-gist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="logo">G2<span>-gist</span></a>
      <nav class="nav-menu" id="navMenu">
        <ul class="menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="reviews.html">Reviews</a></li>
          <li><a href="rankings.html">Rankings</a></li>
          <li><a href="lists.html">Lists</a></li>
          <li><a href="specials.html">Specials</a></li>
          <li><a href="auth.html">Log In</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <div class="header-controls">
        <button id="searchBtn" class="search-btn" aria-label="Search">🔍</button>
        <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Toggle menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="post"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 G2-gist movie Blog.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    const idx = parseInt(getQueryParam('id'), 10);
    const container = document.getElementById('post');
    if (!container) throw new Error('Post container missing');

    if (Number.isInteger(idx) && posts[idx]) {
      const p = posts[idx];
      container.innerHTML = `
        <article class="post-hero">
          <img src="${p.image}" alt="${p.title}" />
          <div class="post-header">
            <h1>${p.title}</h1>
            <div class="post-meta">${p.date} · <strong>${p.category}</strong> · ${p.tags.join(', ')}</div>
          </div>
        </article>
        <article class="post-content">
          <p>${p.excerpt}</p>
          <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Praesent vitae eros eget tellus tristique bibendum. Donec rutrum sed sem quis venenatis. Proin viverra risus a eros volutpat tempor. In quis arcu et eros porta lobortis sit amet at lacus. Curabitur sed facilisis sapien. Aliquam erat volutpat.</p>
        </article>
      `;
    } else {
      container.innerHTML = '<p>Sorry, that post could not be found.</p>';
    }
  </script>
</body>
</html>
